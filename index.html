<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diablo 2: Resurrected | Tools</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/custom/_bundle.css" />
    <meta name="description" content="" />

    <meta property="og:title" content="" />
    <meta property="og:type" content="" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <meta property="og:image:alt" content="" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.png" />

    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#fafafa" />
    <meta name="color-scheme" content="dark light" />

    <script type="module" src="js/plugins.js"></script>
    <script type="module" src="js/main.js"></script>
  </head>

  <body>
    <header>
      <h1>Diablo 2: Resurrected | Tools</h1>
      <nav>
        <ol>
          <li><a href="#">Runewords</a></li>
        </ol>
      </nav>
    </header>
    <main>
      <form id="runeword-form">
        <search></search>
      </form>
    </main>

    <template id="fieldset-template">
      <fieldset>
        <legend>
          <label>
            <input
              type="checkbox"
              checked=""
              class="toggle-collapsible visually-hidden"
            />
          </label>
        </legend>
        <div class="collapsible-content"></div>
      </fieldset>
    </template>

    <template id="checkbox-template">
      <label>
        <input type="checkbox" />
      </label>
    </template>

    <template id="search-results-output-template">
      <output></output>
    </template>

    <template id="search-results-table-template">
      <table class="table-first-column-max-width-50-pct">
        <thead>
          <tr>
            <th class="text-align-left">Runeword</th>
            <th class="text-align-left">Stats</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </template>

    <template id="search-results-row-template">
      <tr>
        <td>
          <strong
            class="runeword-name font-size-larger font-weight-normal"
          ></strong>
          <dl></dl>
        </td>
        <td>
          <ul class="padding-left-0 list-style-position-inside"></ul>
        </td>
      </tr>
    </template>

    <template id="runeword-list-property-template">
      <dt></dt>
      <dd>
        <ol class="list-inline"></ol>
      </dd>
    </template>

    <template id="runeword-list-property-item-template">
      <li></li>
    </template>

    <template id="runeword-single-property-template">
      <dt></dt>
      <dd></dd>
    </template>

    <template id="runeword-stat-item-template">
      <li></li>
    </template>
  </body>
</html>
